<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>J.A.R.V.I.S — 온종일 통합 관제</title>
<meta name="description" content="온종일 사업 통합 관제 AI 비서 — JARVIS">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+KR:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --transition:.5s cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"]{
  --bg:#0e1626; --bg2:#101a2e; --surf:#16223a; --surf2:#1b2942;
  --line:rgba(120,180,255,.14); --line2:rgba(120,180,255,.28);
  --txt:#e8f0ff; --sub:#8aa0c8; --dim:#5a6f93;
  --accent:#38d6ff; --accent2:#6ea8ff; --accent3:#a98bff;
  --glow:rgba(56,214,255,.35); --ok:#34e1a0; --warn:#ffcf5c; --grid:rgba(120,180,255,.05);
  --shadow:0 24px 70px -30px rgba(0,0,0,.8);
}
[data-theme="light"]{
  --bg:#eaeff7; --bg2:#eef2fa; --surf:#ffffff; --surf2:#f3f6fc;
  --line:rgba(40,90,160,.14); --line2:rgba(40,90,160,.3);
  --txt:#0f1b30; --sub:#51648a; --dim:#8497b5;
  --accent:#0a92d6; --accent2:#3a6fe0; --accent3:#7a5ce0;
  --glow:rgba(10,146,214,.22); --ok:#0f9d6e; --warn:#d68a14; --grid:rgba(40,90,160,.05);
  --shadow:0 24px 60px -30px rgba(40,80,160,.3);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);
  min-height:100vh;overflow-x:hidden;transition:background var(--transition),color var(--transition);
  position:relative;
}
/* 배경 그리드 + 오로라 (천천히 흐름) */
body::before{
  content:"";position:fixed;inset:-2px;z-index:0;pointer-events:none;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:54px 54px;animation:gridDrift 24s linear infinite;
}
body::after{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.7;
  background:
    radial-gradient(55% 45% at 82% -5%,var(--glow),transparent 60%),
    radial-gradient(45% 38% at -5% 105%,rgba(169,139,255,.16),transparent 60%);
  animation:auroraBreathe 12s ease-in-out infinite;
}
@keyframes gridDrift{to{background-position:54px 54px}}
@keyframes auroraBreathe{0%,100%{opacity:.5}50%{opacity:.85}}
/* 움직이는 파티클 캔버스 */
#fx{position:fixed;inset:0;z-index:0;pointer-events:none}
/* 회전하는 거대 HUD 데코 링 */
.deco-ring{position:fixed;z-index:0;pointer-events:none;border-radius:50%;border:1px solid var(--line);opacity:.5}
.deco-ring.d1{width:680px;height:680px;right:-220px;top:-180px;border-style:dashed;animation:spin 90s linear infinite}
.deco-ring.d2{width:460px;height:460px;right:-110px;top:-70px;border-color:var(--line2);animation:spin 60s linear infinite reverse}
.deco-ring.d3{width:520px;height:520px;left:-240px;bottom:-220px;border-style:dashed;animation:spin 120s linear infinite}
.deco-ring::before{content:"";position:absolute;width:8px;height:8px;border-radius:50%;background:var(--accent);
  top:-4px;left:50%;box-shadow:0 0 14px var(--accent)}
.mono{font-family:'Share Tech Mono',monospace}
.orb{font-family:'Orbitron',sans-serif}

/* ══ BOOT ══ */
#boot{position:fixed;inset:0;z-index:100;background:
    radial-gradient(60% 60% at 50% 45%,rgba(56,214,255,.08),transparent 70%),var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  transition:opacity .7s,visibility .7s,transform .7s;overflow:hidden}
#boot.gone{opacity:0;visibility:hidden;pointer-events:none;transform:scale(1.08)}
#boot .scan{position:absolute;left:0;right:0;height:120px;pointer-events:none;
  background:linear-gradient(transparent,rgba(56,214,255,.10),transparent);animation:scanMove 2.6s linear infinite}
@keyframes scanMove{0%{top:-120px}100%{top:100%}}
.boot-core{position:relative;width:200px;height:200px;animation:coreEnter .9s cubic-bezier(.2,.9,.2,1) both}
@keyframes coreEnter{from{transform:scale(.4) rotate(-90deg);opacity:0}to{transform:none;opacity:1}}
.boot-ring{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;filter:drop-shadow(0 0 8px currentColor)}
.boot-ring.r1{color:var(--accent);border-top-color:currentColor;border-right-color:currentColor;animation:spin 1.1s linear infinite}
.boot-ring.r2{inset:22px;color:var(--accent2);border-bottom-color:currentColor;border-left-color:currentColor;animation:spin 1.7s linear infinite reverse}
.boot-ring.r3{inset:44px;color:var(--accent3);border-top-color:currentColor;border-bottom-color:currentColor;animation:spin .85s linear infinite}
.boot-ring.r4{inset:-16px;border-style:dashed;color:var(--ok);border-color:currentColor;opacity:.35;animation:spin 6s linear infinite}
/* 코어 둘레를 도는 위성 점들 */
.boot-orbit{position:absolute;inset:0;animation:spin 2.4s linear infinite}
.boot-orbit i{position:absolute;top:-5px;left:50%;width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent)}
.boot-orbit.o2{animation-duration:3.6s;animation-direction:reverse}.boot-orbit.o2 i{background:var(--accent3);box-shadow:0 0 14px var(--accent3);top:auto;bottom:-5px}
.boot-core-c{position:absolute;inset:66px;border-radius:50%;
  background:radial-gradient(circle,#fff,var(--accent) 40%,transparent 72%);
  display:grid;place-items:center;animation:corePulse 1s ease-in-out infinite}
.boot-core-c span{font-family:'Orbitron';font-weight:900;font-size:30px;color:#04121a;text-shadow:0 0 18px #fff}
.boot-title{font-family:'Orbitron';font-weight:900;font-size:clamp(30px,7vw,58px);letter-spacing:.2em;position:relative;
  background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2),var(--accent));background-size:300% 100%;
  -webkit-background-clip:text;background-clip:text;color:transparent;animation:hueShift 3s linear infinite,titleIn .8s .3s both}
@keyframes hueShift{to{background-position:300% 0}}
@keyframes titleIn{from{opacity:0;letter-spacing:.5em;filter:blur(8px)}to{opacity:1}}
.boot-log{font-family:'Share Tech Mono';font-size:13px;color:var(--sub);min-height:130px;width:min(90vw,460px);text-align:left}
.boot-log div{opacity:0;transform:translateX(-10px);animation:logIn .35s forwards}
.boot-log .ok{color:var(--ok)}.boot-log .cy{color:var(--accent)}
.boot-bar{width:min(90vw,460px);height:5px;border-radius:99px;background:var(--surf);overflow:hidden;position:relative}
.boot-bar i{display:block;height:100%;width:0;border-radius:99px;
  background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));background-size:200% 100%;
  animation:fill 3.4s cubic-bezier(.6,.1,.4,1) forwards,hueShift 1.5s linear infinite}
.boot-pct{font-family:'Share Tech Mono';font-size:12px;color:var(--accent);letter-spacing:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes corePulse{0%,100%{transform:scale(1);box-shadow:0 0 30px var(--glow)}50%{transform:scale(1.15);box-shadow:0 0 60px var(--accent)}}
@keyframes logIn{to{opacity:1;transform:none}}
@keyframes fill{to{width:100%}}

/* ══ APP ══ */
#app{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:22px clamp(14px,3vw,32px) 160px;opacity:0;transition:opacity .8s}
#app.on{opacity:1}

/* 헤더 */
.hud-top{display:flex;align-items:center;gap:16px;padding:14px 20px;border-radius:18px;
  background:var(--surf);border:1px solid var(--line);box-shadow:var(--shadow);margin-bottom:22px;position:relative;overflow:hidden}
.hud-top::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--accent),var(--accent3))}
.hud-logo{display:flex;align-items:center;gap:12px}
.hud-logo .mark{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;
  background:radial-gradient(circle at 50% 40%,var(--accent),var(--accent2));font-family:'Orbitron';font-weight:900;color:#04121a;font-size:20px;box-shadow:0 0 22px -4px var(--glow)}
.hud-logo b{font-family:'Orbitron';font-weight:900;font-size:18px;letter-spacing:.16em}
.hud-logo i{display:block;font-style:normal;font-size:10.5px;color:var(--sub);letter-spacing:.2em;margin-top:2px}
.hud-spacer{flex:1}
.hud-status{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--sub);font-family:'Share Tech Mono'}
.led{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 10px var(--ok);animation:blink 2s infinite}
@keyframes blink{50%{opacity:.4}}
.hud-clock{font-family:'Share Tech Mono';font-size:15px;color:var(--accent);letter-spacing:1px}
.theme-btn{width:54px;height:30px;border-radius:99px;border:1px solid var(--line2);background:var(--surf2);
  position:relative;cursor:pointer;transition:.3s;flex-shrink:0}
.theme-btn i{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;font-size:12px;transition:.35s cubic-bezier(.34,1.56,.64,1)}
[data-theme="light"] .theme-btn i{transform:translateX(24px)}

/* 레이아웃 */
.hud-grid{display:grid;grid-template-columns:300px 1fr;gap:22px}
@media(max-width:880px){.hud-grid{grid-template-columns:1fr}}

/* 좌측 시스템 패널 */
.panel{background:var(--surf);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow)}
.panel-h{font-family:'Share Tech Mono';font-size:11px;letter-spacing:.18em;color:var(--sub);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.panel-h::before{content:"";width:14px;height:2px;background:var(--accent)}
.gauges{display:flex;flex-direction:column;gap:18px}
.gauge{display:flex;align-items:center;gap:14px}
.ring{--v:70;width:62px;height:62px;border-radius:50%;flex-shrink:0;position:relative;
  background:conic-gradient(var(--accent) calc(var(--v)*1%),var(--surf2) 0);display:grid;place-items:center}
.ring::after{content:"";position:absolute;inset:7px;border-radius:50%;background:var(--surf)}
.ring b{position:relative;z-index:1;font-family:'Share Tech Mono';font-size:14px;color:var(--accent)}
.gauge-info b{display:block;font-size:14px;font-weight:700}
.gauge-info span{font-size:11px;color:var(--sub)}
.spark{margin-top:4px;display:flex;align-items:flex-end;gap:3px;height:32px}
.spark i{flex:1;background:linear-gradient(var(--accent),var(--accent2));border-radius:2px;opacity:.7;animation:sparkUp .8s ease both}
@keyframes sparkUp{from{height:0}}

/* 사업 카드 */
.biz-head{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
.biz-head h2{font-family:'Orbitron';font-size:16px;letter-spacing:.05em}
.biz-head span{font-size:12px;color:var(--sub);font-family:'Share Tech Mono'}
.biz-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;perspective:1200px}
@media(max-width:680px){.biz-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:420px){.biz-grid{grid-template-columns:1fr}}
.biz-card{background:var(--surf);border:1px solid var(--line);border-radius:16px;padding:16px;position:relative;overflow:hidden;
  cursor:pointer;transition:transform .35s cubic-bezier(.2,.8,.2,1),border-color .3s,box-shadow .3s;text-decoration:none;color:inherit;display:block;
  opacity:0;transform:translateY(22px);}
.biz-card.in{opacity:1;transform:none}
.biz-card{transform-style:preserve-3d;will-change:transform}
.bc-emoji,.bc-name,.bc-metric b{transform:translateZ(28px)}
.bc-desc,.bc-led{transform:translateZ(14px)}
.bc-float{position:absolute;inset:0;border-radius:16px;pointer-events:none;
  background:linear-gradient(115deg,transparent 30%,color-mix(in srgb,var(--c,var(--accent)) 22%,transparent) 50%,transparent 70%);
  opacity:0;transition:opacity .3s}
.biz-card:hover .bc-float{opacity:.5}
/* 카드별 테마색 = --c (JS에서 주입) */
.biz-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--c,var(--accent)),transparent);transform:scaleX(0);transform-origin:left;transition:transform .4s}
.biz-card::after{content:"";position:absolute;inset:0;border-radius:16px;pointer-events:none;
  background:radial-gradient(120% 80% at 50% -10%,color-mix(in srgb,var(--c,var(--accent)) 16%,transparent),transparent 60%);opacity:0;transition:opacity .4s}
.biz-card:hover{transform:translateY(-7px) scale(1.015);border-color:color-mix(in srgb,var(--c,var(--accent)) 50%,var(--line));box-shadow:0 22px 46px -24px var(--c,var(--glow))}
.biz-card:hover::before{transform:scaleX(1)}
.biz-card:hover::after{opacity:1}
.bc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;position:relative}
.bc-emoji{font-size:26px;width:46px;height:46px;border-radius:12px;display:grid;place-items:center;
  background:color-mix(in srgb,var(--c,var(--accent)) 14%,transparent);transition:transform .35s}
.biz-card:hover .bc-emoji{transform:scale(1.1) rotate(-6deg)}
.bc-led{display:flex;align-items:center;gap:5px;font-size:10px;font-family:'Share Tech Mono';color:var(--ok)}
.bc-led .led{width:6px;height:6px}
.bc-name{font-weight:900;font-size:15px;margin-bottom:3px;position:relative}
.bc-desc{font-size:11.5px;color:var(--sub);line-height:1.5;min-height:34px;position:relative}
.bc-metric{margin-top:12px;display:flex;align-items:baseline;gap:6px;padding-top:12px;border-top:1px solid var(--line);position:relative}
.bc-metric b{font-family:'Share Tech Mono';font-size:20px;color:var(--c,var(--accent))}
.bc-metric span{font-size:11px;color:var(--sub)}

/* 자비스 채팅 (하단 고정) */
.jarvis-bar{position:fixed;left:0;right:0;bottom:0;z-index:20;padding:14px clamp(14px,3vw,32px);
  background:linear-gradient(to top,var(--bg) 70%,transparent);}
.jarvis-inner{max-width:1280px;margin:0 auto}
.jarvis-msgs{display:flex;flex-direction:column;gap:8px;max-height:34vh;overflow-y:auto;margin-bottom:10px;padding-right:4px}
.jmsg{max-width:80%;padding:11px 15px;border-radius:14px;font-size:14px;line-height:1.6;animation:msgIn .3s ease}
.jmsg.j{align-self:flex-start;background:var(--surf);border:1px solid var(--line2);border-bottom-left-radius:4px}
.jmsg.u{align-self:flex-end;background:linear-gradient(135deg,var(--accent2),var(--accent3));color:#fff;border-bottom-right-radius:4px}
.jmsg.j b{color:var(--accent);font-family:'Share Tech Mono';font-size:11px;display:block;margin-bottom:3px;letter-spacing:.1em}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.jarvis-input{display:flex;gap:10px;align-items:center;background:var(--surf);border:1px solid var(--line2);
  border-radius:16px;padding:8px 8px 8px 18px;box-shadow:var(--shadow)}
.jarvis-input .pulse-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 1.4s infinite;flex-shrink:0}
.jarvis-input input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-size:15px;font-family:inherit}
.jarvis-input input::placeholder{color:var(--dim)}
.jarvis-input button{width:44px;height:44px;border-radius:12px;border:none;cursor:pointer;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#04121a;font-size:18px;font-weight:900;
  transition:transform .15s;display:grid;place-items:center}
.jarvis-input button:active{transform:scale(.9)}
.typing span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin:0 1px;animation:typing 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
</style>
</head>
<body>
<canvas id="fx"></canvas>
<span class="deco-ring d1"></span><span class="deco-ring d2"></span><span class="deco-ring d3"></span>

<!-- ══ 부팅 ══ -->
<section id="boot">
  <span class="scan"></span>
  <div class="boot-core">
    <span class="boot-ring r4"></span>
    <span class="boot-ring r1"></span><span class="boot-ring r2"></span><span class="boot-ring r3"></span>
    <span class="boot-orbit o1"><i></i></span><span class="boot-orbit o2"><i></i></span>
    <span class="boot-core-c"><span>J</span></span>
  </div>
  <div class="boot-title">J.A.R.V.I.S</div>
  <div class="boot-bar"><i></i></div>
  <div class="boot-pct mono" id="bootPct">0%</div>
  <div class="boot-log mono" id="bootLog"></div>
</section>

<!-- ══ 앱 ══ -->
<div id="app">
  <!-- 헤더 -->
  <div class="hud-top">
    <div class="hud-logo">
      <div class="mark">J</div>
      <div><b class="orb">JARVIS</b><i>ONJONGIL CONTROL</i></div>
    </div>
    <div class="hud-spacer"></div>
    <div class="hud-status"><span class="led"></span> ALL SYSTEMS ONLINE</div>
    <div class="hud-clock mono" id="clock">--:--:--</div>
    <button class="theme-btn" onclick="toggleTheme()" aria-label="테마"><i id="themeIco">🌙</i></button>
  </div>

  <div class="hud-grid">
    <!-- 좌측 시스템 -->
    <div style="display:flex;flex-direction:column;gap:22px">
      <div class="panel">
        <div class="panel-h mono">SYSTEM STATUS</div>
        <div class="gauges">
          <div class="gauge"><div class="ring" style="--v:98"><b>98%</b></div><div class="gauge-info"><b>가동률</b><span>전 사업 정상</span></div></div>
          <div class="gauge"><div class="ring" style="--v:76"><b>76</b></div><div class="gauge-info"><b>오늘 방문</b><span>+12% ↑</span></div></div>
          <div class="gauge"><div class="ring" style="--v:64"><b>64</b></div><div class="gauge-info"><b>처리 작업</b><span>대기 3건</span></div></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-h mono">ACTIVITY · 7D</div>
        <div class="spark" id="spark"></div>
        <div style="margin-top:10px;font-size:12px;color:var(--sub)">최근 7일 통합 트래픽 추이</div>
      </div>
    </div>

    <!-- 사업 카드 -->
    <div class="panel">
      <div class="biz-head"><h2 class="orb">사업 유닛</h2><span class="mono" id="bizCount">6 UNITS · ONLINE</span></div>
      <div class="biz-grid" id="bizGrid"></div>
    </div>
  </div>
</div>

<!-- ══ 자비스 채팅 ══ -->
<div class="jarvis-bar">
  <div class="jarvis-inner">
    <div class="jarvis-msgs" id="msgs"></div>
    <div class="jarvis-input">
      <span class="pulse-dot"></span>
      <input id="chatInput" type="text" placeholder="무엇을 도와드릴까요, 사장님?" autocomplete="off">
      <button onclick="sendMsg()">➤</button>
    </div>
  </div>
</div>

<script>
/* ── 데이터 ── */
const BIZ = [
  { e:'🏬', n:'무한분양', d:'쇼핑몰 빌더 · 24스킨', m:24, u:'스킨', c:'#38d6ff', url:'https://on.xn--zk5biyyw.com' },
  { e:'🥬', n:'온종일팜', d:'농수산물 쇼핑몰', m:128, u:'주문/월', c:'#34e1a0', url:'https://app.yuanfnb.com' },
  { e:'🍽️', n:'유안 F&B', d:'식품 유통 플랫폼', m:20, u:'거래처', c:'#ffb454', url:'https://yuanfnb.com' },
  { e:'🤖', n:'스토어 자동생성', d:'AI 상세페이지 생성', m:'AI', u:'엔진', c:'#a98bff', url:'#' },
  { e:'📊', n:'방판 프로', d:'방문판매 MLM 관리', m:'∞', u:'회원', c:'#ff6fae', url:'#' },
  { e:'🌙', n:'온종일 본사', d:'제작 포트폴리오', m:120, u:'프로젝트', c:'#6ea8ff', url:'https://www.xn--zk5biyyw.com' },
];

/* ── 부팅 시퀀스 ── */
const bootLines = [
  ['코어 시스템 초기화...', 200],

/* ── 앱 초기화 ── */
function initApp(){
  // 사업 카드 (카드별 색 + 카운트업 + 3D 틸트 + stagger 등장)
  document.getElementById('bizGrid').innerHTML = BIZ.map((b,i) => `
    <a class="biz-card" style="--c:${b.c}" href="${b.url}" ${b.url!=='#'?'target="_blank" rel="noopener"':''}>
      <span class="bc-float"></span>
      <div class="bc-top"><span class="bc-emoji">${b.e}</span><span class="bc-led"><span class="led"></span>ONLINE</span></div>
      <div class="bc-name">${b.n}</div>
      <div class="bc-desc">${b.d}</div>
      <div class="bc-metric"><b data-num="${typeof b.m==='number'?b.m:''}">${typeof b.m==='number'?'0':b.m}</b><span>${b.u}</span></div>
    </a>`).join('');
  const cards = [...document.querySelectorAll('.biz-card')];
  cards.forEach((card,i)=>{
    setTimeout(()=>{ card.classList.add('in'); countUp(card.querySelector('.bc-metric b')); }, 120 + i*110);
    // 3D 마우스 틸트 (툭 튀어나오는 입체감)
    card.addEventListener('mousemove', e=>{
      const r=card.getBoundingClientRect();
      const px=(e.clientX-r.left)/r.width-.5, py=(e.clientY-r.top)/r.height-.5;
      card.style.transform=`translateY(-7px) rotateY(${px*12}deg) rotateX(${-py*12}deg) scale(1.02)`;
    });
    card.addEventListener('mouseleave', ()=>{ card.style.transform=''; });
  });
  // 스파크라인
  const sp = document.getElementById('spark');
  sp.innerHTML = [42,55,48,70,62,84,96].map((h,i)=>`<i style="height:${h}%;animation-delay:${i*.08}s"></i>`).join('');
  // 환영 메시지
  setTimeout(()=>addJ('사장님, 모든 사업 유닛이 정상 가동 중입니다. 무엇을 도와드릴까요? <br>예: "매출 알려줘", "무한분양 상태", "오늘 할 일"'), 500);
  startClock();
  liveTicks();
}

/* ── 숫자 카운트업 ── */
function countUp(el){
  if(!el) return; const target=parseInt(el.dataset.num); if(isNaN(target)) return;
  const dur=900, t0=performance.now();
  (function step(t){ const p=Math.min((t-t0)/dur,1); const e=1-Math.pow(1-p,3);
    el.textContent=Math.round(target*e); if(p<1)requestAnimationFrame(step); })(t0);
}

/* ── 라이브 지표 (살아 움직이는 느낌) ── */
function liveTicks(){
  const rings=[...document.querySelectorAll('.ring')];
  setInterval(()=>{
    rings.forEach(r=>{ const b=r.querySelector('b'); const base=parseInt(r.style.getPropertyValue('--v'))||70;
      const jitter=base+Math.round((Math.random()-.5)*4); r.style.setProperty('--v',Math.max(40,Math.min(99,jitter)));
      if(b && !b.textContent.includes('%')) b.textContent=Math.max(40,Math.min(99,jitter)); });
  }, 2200);
}

/* ── 시계 ── */
function startClock(){
  const c = document.getElementById('clock');
  setInterval(()=>{ const d=new Date(); c.textContent = d.toLocaleTimeString('ko-KR',{hour12:false}); }, 1000);
}

/* ── 테마 ── */
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeIco').textContent = next==='dark'?'🌙':'☀️';
  try{ localStorage.setItem('jarvis-theme', next); }catch(e){}
}
(function(){ try{ const t=localStorage.getItem('jarvis-theme'); if(t){ document.documentElement.setAttribute('data-theme',t); document.getElementById('themeIco').textContent=t==='dark'?'🌙':'☀️'; } }catch(e){} })();

// 데모 응답 (※ 실제 AI 연결 자리: 여기서 fetch로 Gemini/Claude 호출하면 됨)
function jarvisReply(q){
  const t = q.replace(/\s/g,'');
  if(/안녕|하이|반가/.test(t)) return '안녕하세요 사장님. 오늘도 온종일이 곁에 있겠습니다. 🌙';
  if(/매출|수익|돈/.test(t)) return '이번 달 통합 매출은 전월 대비 <b style="color:var(--accent)">+18%</b> 입니다. 온종일팜 주문이 특히 늘었어요. 상세 리포트를 볼까요?';
  if(/무한분양/.test(t)) return '무한분양은 정상 가동 중입니다. 24개 스킨, 발행 쇼핑몰 운영 중이고 인트로 영상도 라이브예요.';
  if(/온종일팜|농수산|팜/.test(t)) return '온종일팜은 이번 달 주문 128건 처리 중입니다. 신선식품 카테고리가 가장 활발해요.';
  if(/할일|일정|todo|투두/.test(t)) return '오늘 추천 작업: ① 온종일팜 SQL 미실행 4건 확인 ② 유안 F&B 신규 입점 문의 응대 ③ 토스 PG 가맹 심사 상태 점검';
  if(/날씨/.test(t)) return '죄송하지만 날씨 API는 아직 연결되지 않았습니다. 원하시면 붙여드릴게요. ☁️';
  if(/고마|감사|수고/.test(t)) return '천만에요 사장님. 언제든 불러주세요. 🦾';
  return '"'+q+'" 명령을 접수했습니다. 지금은 데모 모드라 정해진 답변만 드려요 — AI 키(Gemini/Claude)를 연결하면 무엇이든 답하는 진짜 자비스가 됩니다.';
}
function sendMsg(){
  const inp = document.getElementById('chatInput');
  const q = inp.value.trim(); if(!q) return;
  addU(q); inp.value='';
  addTyping();
  setTimeout(()=>{ document.getElementById('typing')?.remove(); addJ(jarvisReply(q)); }, 900+Math.random()*600);
}
document.getElementById('chatInput').addEventListener('keydown', e=>{ if(e.key==='Enter') sendMsg(); });

/* ── 파티클 네트워크 배경 (다채로운 색이 떠다니며 연결) ── */
(function(){
  const cv=document.getElementById('fx'), ctx=cv.getContext('2d');
  const COLORS=['56,214,255','110,168,255','169,139,255','52,225,160','255,180,84','255,111,174'];
  let w,h,pts;
  function resize(){ w=cv.width=innerWidth; h=cv.height=innerHeight;
    const n=Math.min(70,Math.floor(w*h/22000));
    pts=Array.from({length:n},()=>({x:Math.random()*w,y:Math.random()*h,
      vx:(Math.random()-.5)*.45,vy:(Math.random()-.5)*.45,r:Math.random()*1.8+.8,
      c:COLORS[Math.floor(Math.random()*COLORS.length)]})); }
  resize(); addEventListener('resize',resize);
  let mx=-999,my=-999; addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
  (function loop(){
    ctx.clearRect(0,0,w,h);
    for(const p of pts){
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>w)p.vx*=-1; if(p.y<0||p.y>h)p.vy*=-1;
      // 마우스 끌림
      const dx=mx-p.x,dy=my-p.y,dm=Math.hypot(dx,dy);
      if(dm<140){ p.x+=dx/dm*.4; p.y+=dy/dm*.4; }
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fillStyle='rgba('+p.c+',.85)'; ctx.fill();
    }
    for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
      const a=pts[i],b=pts[j],d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<120){ ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
        ctx.strokeStyle='rgba('+a.c+','+(.16*(1-d/120))+')'; ctx.lineWidth=1; ctx.stroke(); }
    }
    requestAnimationFrame(loop);
  })();
})();
</script>
